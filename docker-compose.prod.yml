# 프로덕션 오버라이드
# 사용법: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  postgres:
    ports: []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

  redis:
    ports: []

  minio:
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  backend:
    build:
      target: prod
    volumes: []
    environment:
      DEBUG: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}

  frontend:
    build:
      target: prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    volumes: []
