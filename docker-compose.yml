services:
  # ════════════════════════════════════════
  # Reverse Proxy (SSL Termination)
  # ════════════════════════════════════════

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: gambleguard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - gambleguard

  # ════════════════════════════════════════
  # 인프라 서비스
  # ════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    container_name: gambleguard-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gambleguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gambleguard_dev}
      POSTGRES_DB: ${POSTGRES_DB:-gambleguard}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5435}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gambleguard"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gambleguard

  redis:
    image: redis:7-alpine
    container_name: gambleguard-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gambleguard

  minio:
    image: minio/minio:latest
    container_name: gambleguard-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9002}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9003}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gambleguard

  # MinIO 버킷 자동 생성 (1회성 사이드카)
  minio-init:
    image: minio/mc:latest
    container_name: gambleguard-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/evidence --ignore-existing;
      exit 0;
      "
    networks:
      - gambleguard

  # ════════════════════════════════════════
  # 애플리케이션 서비스
  # ════════════════════════════════════════

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: gambleguard-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gambleguard}:${POSTGRES_PASSWORD:-gambleguard_dev}@postgres:5432/${POSTGRES_DB:-gambleguard}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-gambleguard}:${POSTGRES_PASSWORD:-gambleguard_dev}@postgres:5432/${POSTGRES_DB:-gambleguard}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: evidence
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      CORS_ORIGINS: '["https://localhost"]'
      DEBUG: "true"
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gambleguard

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: gambleguard-web
    environment:
      NEXT_PUBLIC_API_URL: https://localhost/api
      WATCHPACK_POLLING: "true"
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - frontend_nodemodules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gambleguard

# ════════════════════════════════════════
# 볼륨 & 네트워크
# ════════════════════════════════════════

volumes:
  pgdata:
  minio_data:
  frontend_nodemodules:
  nginx_ssl:

networks:
  gambleguard:
    driver: bridge
